<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — MyGoldFolio</title>
  <meta name="description" content="Share feature requests, report bugs, and vote on ideas for MyGoldFolio." />
  <link rel="icon" href="/images/icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0F0F1A',
            'navy-light': '#1A1A2E',
            border: '#1E3A5C',
            gold: '#D4A843',
            mint: '#00D68F',
            muted: '#666677',
          }
        }
      }
    }
  </script>
  <style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }</style>
</head>
<body class="bg-navy text-gray-200 min-h-screen flex flex-col">

  <nav class="border-b border-border/30 backdrop-blur-sm bg-navy/80 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="text-lg font-extrabold text-white">Smart<span class="text-gold">Daily</span>Apps</a>
      <a href="/mygoldfolio/" class="text-sm text-gray-400 hover:text-gold transition">← MyGoldFolio</a>
    </div>
  </nav>

  <main class="flex-1 max-w-5xl mx-auto px-6 py-12 w-full">
    <div class="text-center mb-10">
      <h1 class="text-3xl font-black text-white mb-3">Feedback</h1>
      <p class="text-sm text-gray-400 max-w-lg mx-auto">
        Got a feature idea? Found a bug? Vote on what matters most to you. Your input shapes the roadmap.
      </p>
    </div>

    <!-- Canny embed -->
    <div class="bg-navy-light rounded-2xl border border-border/20 overflow-hidden" style="min-height: 600px;">
      <iframe
        src="https://smartdailyapps.canny.io/mygoldfolio"
        style="width: 100%; height: 700px; border: none;"
        title="MyGoldFolio Feedback Board"
        loading="lazy"
      ></iframe>
    </div>

    <div class="text-center mt-8">
      <p class="text-xs text-muted">
        You can also email feedback directly to
        <a href="mailto:smartdailyapps@gmail.com" class="text-gold hover:underline">smartdailyapps@gmail.com</a>
      </p>
    </div>
  </main>

  <footer class="border-t border-border/20 py-8 px-6">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-muted">
      <p>&copy; 2026 SmartDailyApps. All rights reserved.</p>
      <div class="flex gap-6">
        <a href="/mygoldfolio/privacy/" class="hover:text-gold transition">Privacy</a>
        <a href="/mygoldfolio/changelog/" class="hover:text-gold transition">Changelog</a>
        <a href="/contact/" class="hover:text-gold transition">Contact</a>
      </div>
    </div>
  </footer>
</body>
</html>
